name: Cowsay workflow
on: push

jobs:
  ascii-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: List Repo files
      run: ls -ltra
      
    - name: Execute cowsay asciisript
      run: |
        chmod +x .github/workflows/asciiscript.sh
        .github/workflows/asciiscript.sh

