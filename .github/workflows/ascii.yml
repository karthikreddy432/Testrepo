name: Cowsay workflow
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: List repo files
        run: ls -ltra

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install cowsay
        run: sudo apt-get install -y cowsay

      - name: Generate dragon output
        run: cowsay -f dragon "Run for cover I'm a DRAGON....RAWR!" > dragon.txt

      - name: Verify output contains DRAGON
        run: grep -i "DRAGON" dragon.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragon-artifact
          path: dragon.txt

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dragon-artifact
          
      - name: Show generated output
        run: cat dragon.txt

      - name: List files after deployment step
        run: ls -ltra

